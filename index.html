<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日值班與交辦事項系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #e9ecef;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            width: 100%;
            max-width: 1000px; /* 加寬以容納更多備註文字 */
            padding: 25px 35px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #f0f2f5;
        }
        .date-picker {
            font-size: 1.2rem;
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid #bdc3c7;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
        }
        .save-banner {
            background-color: #2ecc71;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .save-banner.show {
            opacity: 1;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px; /* 讓每一行稍微分開，畫面更乾淨 */
            margin-top: 10px;
        }
        th {
            background-color: #34495e;
            color: white;
            padding: 12px 15px;
            text-align: left;
            border-radius: 4px;
        }
        td {
            padding: 10px 15px;
            background-color: #f8f9fa;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        td:first-child {
            border-left: 1px solid #eee;
            border-radius: 8px 0 0 8px;
            font-size: 1.1rem;
            color: #2c3e50;
        }
        td:last-child {
            border-right: 1px solid #eee;
            border-radius: 0 8px 8px 0;
        }
        tr:hover td {
            background-color: #fdfdfe;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        /* 選擇人員的樣式 */
        select.duty-select {
            width: 100%;
            padding: 10px;
            font-size: 1.05rem;
            border-radius: 6px;
            border: 2px solid #e0e0e0;
            background-color: #fff;
            cursor: pointer;
        }
        select.duty-select:focus {
            border-color: #3498db;
            outline: none;
        }

        /* 備註欄位的樣式優化 */
        .note-container {
            position: relative;
        }
        textarea.note-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 2px solid #e0e0e0;
            background-color: #fffaf0; /* 微暖色背景，突顯這區是提醒事項 */
            resize: vertical; /* 允許垂直拉長 */
            min-height: 45px;
            transition: all 0.2s;
            font-family: inherit;
        }
        textarea.note-input::placeholder {
            color: #aaa;
            font-style: italic;
        }
        textarea.note-input:focus {
            border-color: #e67e22; /* 聚焦時變成橘色警示感 */
            background-color: #fff;
            outline: none;
            min-height: 80px; /* 點擊後自動長高方便輸入 */
        }
        /* 當有輸入內容時，邊框保持較深顏色 */
        textarea.note-input.has-content {
            border-color: #e67e22;
            background-color: #fff;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>📋 每日值班與交辦事項表</h1>
    
    <div class="header-controls">
        <div>
            <label for="datePicker" style="font-size: 1.2rem; margin-right: 10px;">📅 <strong>選擇日期：</strong></label>
            <input type="date" id="datePicker" class="date-picker">
        </div>
        <div id="saveBanner" class="save-banner">✓ 變更已自動儲存</div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="15%">時間段</th>
                <th width="20%">負責人</th>
                <th width="65%">⚠️ 交辦事項 / 特別注意 (點擊展開輸入)</th>
            </tr>
        </thead>
        <tbody id="scheduleBody">
            <!-- JavaScript 會在這裡生成時段 -->
        </tbody>
    </table>
</div>

<script>
    const staffOptions = ["", "翁耀男", "翁耀賜", "翁瀅麗", "翁雪萍", "翁婉玲"];
    const timeSlots = [
        "08:00 - 09:00", "09:00 - 10:00", "10:00 - 11:00", "11:00 - 12:00",
        "12:00 - 13:00", "13:00 - 14:00", "14:00 - 15:00", "15:00 - 16:00",
        "16:00 - 17:00", "17:00 - 18:00", "18:00 - 19:00", "19:00 - 20:00",
        "20:00 - 21:00", "21:00 - 22:00"
    ];

    const datePicker = document.getElementById('datePicker');
    const scheduleBody = document.getElementById('scheduleBody');
    const saveBanner = document.getElementById('saveBanner');
    let saveTimeout;

    window.onload = () => {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${year}-${month}-${day}`;
        
        buildTable();
        loadDateData();
    };

    datePicker.addEventListener('change', loadDateData);

    function buildTable() {
        scheduleBody.innerHTML = '';
        
        timeSlots.forEach((slot, index) => {
            const tr = document.createElement('tr');
            
            // 時間
            const tdTime = document.createElement('td');
            tdTime.innerHTML = `<strong>${slot}</strong>`;
            
            // 負責人
            const tdSelect = document.createElement('td');
            const select = document.createElement('select');
            select.className = 'duty-select';
            select.dataset.index = index;
            
            staffOptions.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name === "" ? "-- 選擇人員 --" : name;
                select.appendChild(option);
            });
            select.addEventListener('change', saveData);
            tdSelect.appendChild(select);
            
            // 備註 (改成 Textarea)
            const tdNote = document.createElement('td');
            const noteContainer = document.createElement('div');
            noteContainer.className = 'note-container';
            
            const textarea = document.createElement('textarea');
            textarea.className = 'note-input';
            textarea.placeholder = '例如：打電話聯絡廠商、檢查冷氣濾網...';
            textarea.dataset.index = index;
            textarea.rows = 1; 
            
            // 監聽輸入：自動存檔 + 檢查是否有內容以改變樣式
            textarea.addEventListener('input', function() {
                checkNoteContent(this);
                saveData();
            });
            
            noteContainer.appendChild(textarea);
            tdNote.appendChild(noteContainer);
            
            tr.appendChild(tdTime);
            tr.appendChild(tdSelect);
            tr.appendChild(tdNote);
            scheduleBody.appendChild(tr);
        });
    }

    // 檢查備註是否有內容，如果有就加上特定 class 讓框線變色
    function checkNoteContent(textarea) {
        if (textarea.value.trim() !== "") {
            textarea.classList.add('has-content');
        } else {
            textarea.classList.remove('has-content');
        }
    }

    function loadDateData() {
        const selectedDate = datePicker.value;
        if (!selectedDate) return;

        const savedData = JSON.parse(localStorage.getItem(`duty_tasks_${selectedDate}`)) || {};
        const selects = document.querySelectorAll('.duty-select');
        const textareas = document.querySelectorAll('.note-input');

        selects.forEach(select => {
            const idx = select.dataset.index;
            select.value = savedData[idx]?.person || "";
        });

        textareas.forEach(textarea => {
            const idx = textarea.dataset.index;
            textarea.value = savedData[idx]?.note || "";
            // 載入資料後，也要檢查一下樣式
            checkNoteContent(textarea);
        });
    }

    function saveData() {
        const selectedDate = datePicker.value;
        if (!selectedDate) return;

        const savedData = {};
        const selects = document.querySelectorAll('.duty-select');
        const textareas = document.querySelectorAll('.note-input');

        timeSlots.forEach((_, index) => {
            savedData[index] = {
                person: selects[index].value,
                note: textareas[index].value
            };
        });

        localStorage.setItem(`duty_tasks_${selectedDate}`, JSON.stringify(savedData));
        showSaveBanner();
    }

    function showSaveBanner() {
        saveBanner.classList.add('show');
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            saveBanner.classList.remove('show');
        }, 1500);
    }
</script>

</body>
</html>
