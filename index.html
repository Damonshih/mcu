<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特製拉霸機 - 依序旋轉版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background-color: #34495e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 4px solid #f1c40f;
            position: relative;
        }
        h1 {
            margin-top: 0;
            color: #f1c40f;
        }
        .slots {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }
        .slot {
            width: 100px;
            height: 120px;
            background-color: white;
            color: #2c3e50;
            font-size: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            border: 3px solid #bdc3c7;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #c0392b;
        }
        button:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 0 0 #c0392b;
        }
        button:disabled {
            background-color: #7f8c8d;
            box-shadow: 0 5px 0 #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            height: 24px;
            color: #e74c3c;
            font-weight: bold;
        }

        /* 彈出視窗樣式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }
        .modal-content h2 {
            margin-top: 0;
            color: #c0392b;
        }
        .pwd-input {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            margin-top: 15px;
            border-radius: 8px;
            border: 2px solid #bdc3c7;
            text-align: center;
            letter-spacing: 2px;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            height: 18px;
            font-weight: bold;
        }
        .modal-btn {
            background-color: #27ae60;
            box-shadow: 0 5px 0 #219a52;
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 20px;
            width: 100%;
        }
        .modal-btn:active {
            box-shadow: 0 0 0 #219a52;
        }
        .close-btn {
            background-color: #95a5a6;
            box-shadow: 0 5px 0 #7f8c8d;
            margin-top: 10px;
            font-size: 16px;
            padding: 10px;
            width: 100%;
        }
        .close-btn:active {
            box-shadow: 0 0 0 #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>幸運拉霸機 🎰</h1>
        <div class="slots">
            <div id="slot1" class="slot">❓</div>
            <div id="slot2" class="slot">❓</div>
            <div id="slot3" class="slot">❓</div>
        </div>
        <button id="spin-btn">開始旋轉！</button>
        <p id="message"></p>
    </div>

    <!-- 密碼解鎖彈出視窗 -->
    <div id="pwd-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">機會用盡了！</h2>
            <p id="modal-desc">請輸入密碼解鎖下一次遊玩機會：</p>
            <input type="password" id="pwd-input" class="pwd-input" placeholder="請輸入解鎖密碼" maxlength="10">
            <div id="error-msg" class="error-msg"></div>
            <button id="unlock-btn" class="modal-btn">🔓 確認解鎖</button>
            <button id="close-modal" class="close-btn">取消</button>
        </div>
    </div>

    <script>
        const symbols = ['🍎', '💎', '🍒', '🔔', '🍉', '⭐', '🍋'];
        
        const btn = document.getElementById('spin-btn');
        const message = document.getElementById('message');
        const slotElements = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3')
        ];
        
        const modal = document.getElementById('pwd-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const pwdInput = document.getElementById('pwd-input');
        const unlockBtn = document.getElementById('unlock-btn');
        const closeModalBtn = document.getElementById('close-modal');
        const errorMsg = document.getElementById('error-msg');

        let gameState = localStorage.getItem('slot_game_state') || 'ready_1';

        window.onload = () => {
            if (gameState === 'played_1' || gameState === 'played_2') {
                const savedResult = JSON.parse(localStorage.getItem('slot_result'));
                if (savedResult) showResult(savedResult);
                
                if (gameState === 'played_1') {
                    lockGame('請輸入密碼解鎖下一次機會！');
                    setTimeout(showModal, 1000);
                } else {
                    lockGame('所有機會已用盡！');
                    setTimeout(showModal, 1000);
                }
            } else if (gameState === 'ready_2') {
                message.textContent = '已成功解鎖第 2 次機會！';
                btn.textContent = '開始第二次旋轉！';
                btn.disabled = false;
                btn.style.backgroundColor = '#27ae60';
                btn.style.boxShadow = '0 5px 0 #219a52';
            }
        };

        btn.addEventListener('click', () => {
            if (gameState === 'played_1' || gameState === 'played_2') {
                showModal();
                return;
            }

            btn.disabled = true;
            message.textContent = '旋轉中...';
            errorMsg.textContent = '';

            const symbolA = symbols[Math.floor(Math.random() * symbols.length)];
            let symbolB = symbols[Math.floor(Math.random() * symbols.length)];
            while (symbolB === symbolA) {
                symbolB = symbols[Math.floor(Math.random() * symbols.length)];
            }

            let finalResult;
            if (gameState === 'ready_1') {
                finalResult = [symbolA, symbolA, symbolB];
                gameState = 'played_1';
            } else if (gameState === 'ready_2') {
                finalResult = [symbolB, symbolA, symbolA];
                gameState = 'played_2';
            }

            localStorage.setItem('slot_game_state', gameState);
            localStorage.setItem('slot_result', JSON.stringify(finalResult));

            // 修改後的「依序選轉出來」動畫邏輯
            let counter = 0;
            const spinInterval = setInterval(() => {
                counter++;
                
                // 第一個槽：轉動 10 次（1 秒）後固定
                if (counter <= 10) {
                    slotElements[0].textContent = symbols[Math.floor(Math.random() * symbols.length)];
                } else if (counter === 11) {
                    slotElements[0].textContent = finalResult[0];
                }

                // 第二個槽：轉動 20 次（2 秒）後固定
                if (counter <= 20) {
                    slotElements[1].textContent = symbols[Math.floor(Math.random() * symbols.length)];
                } else if (counter === 21) {
                    slotElements[1].textContent = finalResult[1];
                }

                // 第三個槽：轉動 30 次（3 秒）後固定並結束
                if (counter <= 30) {
                    slotElements[2].textContent = symbols[Math.floor(Math.random() * symbols.length)];
                } else if (counter === 31) {
                    slotElements[2].textContent = finalResult[2];
                    
                    clearInterval(spinInterval);
                    
                    if (gameState === 'played_1') {
                        lockGame('就差一點點！請解鎖下一次機會。');
                        setTimeout(showModal, 1000);
                    } else {
                        lockGame('還是差一點點！感謝遊玩。');
                        setTimeout(showModal, 1000);
                    }
                }
            }, 100);
        });

        unlockBtn.addEventListener('click', () => {
            if (pwdInput.value === '6767') {
                if (gameState === 'played_1') {
                    gameState = 'ready_2';
                    localStorage.setItem('slot_game_state', gameState);
                    localStorage.removeItem('slot_result');
                    alert('密碼正確！已成功解鎖第二次機會。');
                    location.reload();
                } else if (gameState === 'played_2') {
                    errorMsg.textContent = '密碼正確，但次數已達上限！';
                } else {
                    modal.classList.remove('show');
                }
            } else {
                errorMsg.textContent = '密碼錯誤，請重新輸入！';
                pwdInput.value = '';
                pwdInput.focus();
            }
        });

        pwdInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                unlockBtn.click();
            }
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('show');
            if (gameState === 'played_1') {
                btn.textContent = '輸入密碼解鎖';
                btn.disabled = false;
                btn.style.backgroundColor = '#2980b9';
                btn.style.boxShadow = '0 5px 0 #2471a3';
            }
        });

        function showResult(resultArray) {
            slotElements[0].textContent = resultArray[0];
            slotElements[1].textContent = resultArray[1];
            slotElements[2].textContent = resultArray[2];
        }

        function lockGame(msg) {
            btn.disabled = true;
            btn.textContent = '已結束';
            message.textContent = msg;
            btn.style.backgroundColor = '#7f8c8d';
            btn.style.boxShadow = '0 5px 0 #95a5a6';
        }

        function showModal() {
            errorMsg.textContent = '';
            pwdInput.value = '';
            if (gameState === 'played_2') {
                modalTitle.textContent = '遊戲已完全結束';
                modalDesc.textContent = '您已經完成了兩次遊玩，無法再解鎖。';
                pwdInput.style.display = 'none';
                unlockBtn.style.display = 'none';
            } else {
                modalTitle.textContent = '機會用盡了！';
                modalDesc.textContent = '請輸入密碼解鎖下一次遊玩機會：';
                pwdInput.style.display = 'block';
                unlockBtn.style.display = 'block';
            }
            modal.classList.add('show');
        }
    </script>
</body>
</html>
